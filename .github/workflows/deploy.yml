name: Weekly KRERA Data Refresh

on:
  # Run every Sunday at 2am IST (8:30pm Saturday UTC)
  schedule:
    - cron: "30 20 * * 0"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated projects_data.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest KRERA data
        run: python3 build.py --fetch

      - name: Commit updated projects_data.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects_data.json
          git diff --cached --quiet || git commit -m "chore: weekly KRERA data refresh [skip ci]"
          git push
